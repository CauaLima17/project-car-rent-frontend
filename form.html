<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EncontraAQ | Formulário</title>
    <link rel="icon" type="image/svg" href="./src/assets/icons/AQ.svg">
    <link rel="stylesheet" href="./src/css/output.css">
</head>

<body class="flex items-center justify-center bg-gray-100 min-h-screen px-4">
    <div class="flex flex-col max-w-5xl w-full shadow-xl rounded-xl bg-white min-h-[600px] max-h-[90vh] overflow-y-auto">
        <div class="flex bg-gradient-to-r from-green-400 to-green-500 text-white font-medium px-4 py-4 rounded-t-xl">
            <h1 class="text-2xl">Formulário de Aquisição<span><img src="./src/assets/icons/forms.png" alt=""></span></h1>
        </div>
        
        <form class="flex-grow px-4 py-4 rounded-b-2xl" action="">
            <h2 class="font-medium text-2xl mb-4 underline"> Check in</h2>
            <div class="mb-2"> 
                <label class="font-medium block mb-2" for="carro">Seu carro:</label>
                <input class="mb-4 rounded-2xl bg-gray-200 w-full text-gray-600 p-2"type="text" value="" id="carro">
            </div>
            <div>
                <label class="font-medium block mb-2" for="data">Data de Retirada:</label>
                <input class="mb-4 rounded-2xl bg-gray-200 w-full text-gray-600 p-2" type="date" id="data">
            </div>
            <div>
                <label class="font-medium block mb-2" for="horario">Horário de Retirada:</label>
                <input class="mb-4 rounded-2xl bg-gray-200 w-full text-gray-600 p-2" type="time" id="horario">
            </div>
            <div>
                <label class="font-medium block mb-2" for="local">Local de Retirada:</label>
                <input class="mb-4 rounded-2xl bg-gray-200 w-full text-gray-600 p-2" type="text" id="local">
            </div>
            <h2 class="font-medium text-2xl mt-4 mb-4 underline">Check out</h2>
            <div>
                <label class="font-medium block mb-2" for="data_dev">Data de Devolução:</label>
                <input class="mb-4 rounded-2xl bg-gray-200 w-full text-gray-600 p-2" type="date" id="data_dev">
            </div>
            <div>
                <label class="font-medium block mb-2" for="horario_dev">Horário de Devolução:</label>
                <input class="mb-4 rounded-2xl bg-gray-200 w-full text-gray-600 p-2" type="time" id="horario_dev">
            </div>
            <div>
                <label class="font-medium block mb-2" for="local_dev">Local de Devolução:</label>
                <input class="mb-4 rounded-2xl bg-gray-200 w-full text-gray-600 p-2" type="text" id="local_dev">
            </div>

            <button class="cursor-pointer bg-gradient-to-r from-green-400 to-green-500 rounded-2xl text-white font-medium p-2 w-full mb-4">Enviar</button>

        </form>
    </div>
</body>
